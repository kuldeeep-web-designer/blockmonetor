<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BlockMentor AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    :root {
        --bg-gradient: linear-gradient(135deg, #1e3c72, #2a5298);
        --chat-bg: rgba(255, 255, 255, 0.1);
        --header-bg: rgba(0, 0, 0, 0.3);
        --user-bg: #00c6ff;
        --bot-bg: #ffffff;
        --text-color: white;
        --input-bg: rgba(0,0,0,0.2);
        --button-bg: #00c6ff;
        --button-hover: #00a2cc;
        --shadow: 0 8px 30px rgba(0,0,0,0.3);
        --border-radius: 12px;
    }

    [data-theme="light"] {
        --bg-gradient: linear-gradient(135deg, #f0f4f8, #d9e2ec);
        --chat-bg: rgba(255, 255, 255, 0.9);
        --header-bg: rgba(0, 0, 0, 0.1);
        --user-bg: #4a90e2;
        --bot-bg: #f8f9fa;
        --text-color: #333;
        --input-bg: rgba(255,255,255,0.8);
        --button-bg: #4a90e2;
        --button-hover: #357abd;
        --shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: 'Google Sans', 'Segoe UI', sans-serif;
        background: var(--bg-gradient);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        transition: background 0.3s ease;
        padding: 10px;
    }

    .chat-container {
        width: 100%;
        max-width: 800px;
        height: 90vh;
        max-height: 700px;
        background: var(--chat-bg);
        backdrop-filter: blur(15px);
        border-radius: var(--border-radius);
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transition: all 0.3s ease;
    }

    .chat-header {
        background: var(--header-bg);
        color: var(--text-color);
        padding: 15px 20px;
        font-size: 18px;
        font-weight: 500;
        text-align: center;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .theme-toggle {
        background: none;
        border: none;
        color: var(--text-color);
        font-size: 20px;
        cursor: pointer;
        transition: transform 0.2s ease;
        padding: 5px;
        border-radius: 50%;
    }

    .theme-toggle:hover {
        transform: scale(1.1);
        background: rgba(255,255,255,0.1);
    }

    #chatbox {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        color: var(--text-color);
        scrollbar-width: thin;
        scrollbar-color: var(--button-bg) transparent;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    #chatbox::-webkit-scrollbar {
        width: 6px;
    }

    #chatbox::-webkit-scrollbar-thumb {
        background: var(--button-bg);
        border-radius: 3px;
    }

    .message {
        max-width: 80%;
        padding: 12px 16px;
        border-radius: var(--border-radius);
        line-height: 1.5;
        animation: slideIn 0.3s ease-out;
        word-wrap: break-word;
    }

    @keyframes slideIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .user {
        background: var(--user-bg);
        color: white;
        margin-left: auto;
        border-bottom-right-radius: 4px;
        align-self: flex-end;
    }

    .bot {
        background: var(--bot-bg);
        color: #222;
        margin-right: auto;
        border-bottom-left-radius: 4px;
        align-self: flex-start;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .typing-indicator {
        display: none;
        background: var(--bot-bg);
        color: #222;
        margin-right: auto;
        align-self: flex-start;
        padding: 12px 16px;
        border-radius: var(--border-radius);
        border-bottom-left-radius: 4px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .typing-dots {
        display: inline-block;
    }

    .typing-dots span {
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #666;
        animation: typing 1.4s infinite ease-in-out;
        margin: 0 2px;
    }

    .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
    .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes typing {
        0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
        40% { transform: scale(1); opacity: 1; }
    }

    .chat-input {
        display: flex;
        padding: 15px 20px;
        background: var(--input-bg);
        border-top: 1px solid rgba(255,255,255,0.1);
        gap: 10px;
    }

    .chat-input input {
        flex: 1;
        padding: 12px 16px;
        border: 2px solid transparent;
        border-radius: var(--border-radius);
        outline: none;
        font-size: 16px;
        background: rgba(255,255,255,0.9);
        transition: all 0.2s ease;
        font-family: inherit;
    }

    .chat-input input:focus {
        border-color: var(--button-bg);
        box-shadow: 0 0 0 3px rgba(0, 198, 255, 0.2);
    }

    .chat-input button {
        padding: 12px 20px;
        border: none;
        border-radius: var(--border-radius);
        background: var(--button-bg);
        color: white;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
        font-size: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .chat-input button:hover:not(:disabled) {
        background: var(--button-hover);
        transform: translateY(-1px);
    }

    .chat-input button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    .send-icon {
        font-size: 18px;
    }

    @media (max-width: 768px) {
        .chat-container {
            height: 100vh;
            max-height: none;
            border-radius: 0;
        }

        .chat-header {
            padding: 12px 15px;
            font-size: 16px;
        }

        #chatbox {
            padding: 15px;
        }

        .message {
            max-width: 90%;
        }

        .chat-input {
            padding: 12px 15px;
        }

        .chat-input input {
            font-size: 16px;
        }

        .chat-input button {
            padding: 12px 16px;
            font-size: 14px;
        }
    }
</style>

</head>

<body data-theme="dark">

<div class="chat-container">

    <div class="chat-header">
        🤖 BlockMentor AI
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    </div>

    <div id="chatbox">
        <div class="message bot">
            Hello! I'm BlockMentor AI 🤖<br>
            I specialize in Blockchain-Based Application Development.<br>
            Ask me anything about smart contracts, Web3, or dApps!
        </div>
    </div>

    <div class="typing-indicator" id="typingIndicator">
        <div class="typing-dots">
            <span></span><span></span><span></span>
        </div>
        BlockMentor is thinking...
    </div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Ask about blockchain, smart contracts..." />
        <button onclick="sendMessage()" id="sendButton">
            <span class="send-icon">🚀</span> Send
        </button>
    </div>

</div>

<script>
function toggleTheme() {
    const body = document.body;
    const toggleBtn = document.querySelector('.theme-toggle');
    if (body.getAttribute('data-theme') === 'dark') {
        body.setAttribute('data-theme', 'light');
        toggleBtn.textContent = '☀️';
    } else {
        body.setAttribute('data-theme', 'dark');
        toggleBtn.textContent = '🌙';
    }
}

async function sendMessage() {
    const inputField = document.getElementById("userInput");
    const sendButton = document.getElementById("sendButton");
    const userInput = inputField.value.trim();

    if (!userInput) return;

    const chatbox = document.getElementById("chatbox");
    const typingIndicator = document.getElementById("typingIndicator");

    // Add user message
    chatbox.innerHTML += `<div class="message user">${userInput}</div>`;
    inputField.value = "";

    // Show typing indicator
    typingIndicator.style.display = "block";
    sendButton.disabled = true;
    sendButton.innerHTML = '<span class="send-icon">⏳</span> Sending...';

    // Scroll to bottom
    chatbox.scrollTop = chatbox.scrollHeight;

    try {
        const response = await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message: userInput })
        });

        const data = await response.json();

        // Hide typing indicator
        typingIndicator.style.display = "none";

        // Add bot message
        function formatResponse(text) {
            return text
                .replace(/\n/g, "<br>")
                .replace(/\*\s*/g, "• ");
        }

        chatbox.innerHTML += `<div class="message bot">${formatResponse(data.response)}</div>`;

    } catch (error) {
        typingIndicator.style.display = "none";
        chatbox.innerHTML += `<div class="message bot">Sorry, I encountered an error. Please try again.</div>`;
    }

    // Reset button
    sendButton.disabled = false;
    sendButton.innerHTML = '<span class="send-icon">🚀</span> Send';

    // Auto scroll
    chatbox.scrollTop = chatbox.scrollHeight;
}

// Enter key support
document.getElementById("userInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter" && !document.getElementById("sendButton").disabled) {
        sendMessage();
    }
});

// Focus input on load
document.getElementById("userInput").focus();
</script>

</body>
</html>
